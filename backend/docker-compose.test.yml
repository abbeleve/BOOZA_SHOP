version: '3.8'

services:
  postgres-test:
    image: postgres:16.2-alpine
    container_name: postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test_password_123
      POSTGRES_DB: rms_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    command: -c shared_buffers=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d rms_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_test_data:

