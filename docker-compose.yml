services:
  db:
    image: postgres:16.2-alpine # Uses a lightweight PostgreSQL image
    restart: always # Ensures the container restarts if it fails
    shm_size: 128mb # Recommended for performance
    ports:
      - "5432:5432" # Maps the container port 5432 to the host port 5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER} # Sets the default user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Sets the password for the user
      POSTGRES_DB: ${POSTGRES_DB} # Sets a custom default database name
    volumes:
      - pgdata:/var/lib/postgresql/data # Persists database data on the host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer # Optional: A lightweight web-based DB management tool
    restart: always
    ports:
      - "8080:8080" # Access via http://localhost:8080
    depends_on:
    - db
  
  backend:
    build:
      context: backend/
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Монтируем весь код бэкенда для hot reload
      - ./backend:/app
      - ./backend/static:/app/static
      # Монтируем alembic для миграций
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    # Запуск приложения
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata: