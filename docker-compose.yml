services:
  db:
    image: postgres:16.2-alpine # Uses a lightweight PostgreSQL image
    restart: always # Ensures the container restarts if it fails
    shm_size: 128mb # Recommended for performance
    ports:
      - "5432:5432" # Maps the container port 5432 to the host port 5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER} # Sets the default user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Sets the password for the user
      POSTGRES_DB: ${POSTGRES_DB} # Sets a custom default database name
    volumes:
      - pgdata:/var/lib/postgresql/data # Persists database data on the host

  adminer:
    image: adminer # Optional: A lightweight web-based DB management tool
    restart: always
    ports:
      - "8080:8080" # Access via http://localhost:8080
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db
    command: alembic upgrade head
    restart: "on-failure"

volumes:
  pgdata: # Defines the volume for data persistence
